models:
  - name: dim_monthly_zone_revenue
    description: >
      Aggregated table of all taxi trips corresponding to both service zones (Green and Yellow) per pickup zone, month and service.
      The table contains monthly sums of the fare elements used to calculate the monthly revenue.
      The table additionally contains monthly indicators like number of trips, and average trip distance.
    columns:
      - name: revenue_zone
        data_type: string
        description: ""

      - name: revenue_month
        data_type: timestamp
        description: ""

      - name: service_type
        data_type: string
        description: ""

      - name: revenue_monthly_fare
        data_type: numeric
        description: ""

      - name: revenue_monthly_extra
        data_type: numeric
        description: ""

      - name: revenue_monthly_mta_tax
        data_type: numeric
        description: ""

      - name: revenue_monthly_tip_amount
        data_type: numeric
        description: ""

      - name: revenue_monthly_tolls_amount
        data_type: numeric
        description: ""

      - name: revenue_monthly_improvement_surcharge
        data_type: numeric
        description: ""

      - name: revenue_monthly_total_amount
        data_type: numeric
        description: Monthly sum of the total_amount of the fare charged for the trip per pickup zone, month and service.

      - name: total_monthly_trips
        data_type: int64
        description: ""

      - name: avg_montly_passenger_count
        data_type: float64
        description: ""

      - name: avg_monthly_trip_distance
        data_type: numeric
        description: ""

  - name: dim_zones
    description: >
      List of unique zones identified by locationid.
      Includes the service zone they correspond to (Green or Yellow).
    columns:
      - name: location_id
        data_type: numeric
        description: ""

      - name: borough
        data_type: string
        description: ""

      - name: zone
        data_type: string
        description: ""

      - name: service_zone
        data_type: string
        description: ""

  - name: fact_trips
    description: >
      Taxi trips corresponding to both service zones (Green and Yellow).
      The table contains records where both pickup and dropoff locations are valid and known zones.
      Each record corresponds to a trip uniquely identified by tripid.
    columns:
      - name: tripid
        data_type: string
        description: ""

      - name: vendor_id
        data_type: int64
        description: ""

      - name: service_type
        data_type: string
        description: ""

      - name: rate_code_id
        data_type: int64
        description: ""

      - name: pickup_location_id
        data_type: int64
        description: ""

      - name: dropoff_location_id
        data_type: int64
        description: ""

      - name: pickup_datetime
        data_type: timestamp
        description: ""

      - name: dropoff_datetime
        data_type: timestamp
        description: ""

      - name: store_and_fwd_flag
        data_type: string
        description: ""

      - name: passenger_count
        data_type: int64
        description: ""

      - name: trip_distance
        data_type: numeric
        description: ""

      - name: fare_amount
        data_type: numeric
        description: ""

      - name: extra
        data_type: numeric
        description: ""

      - name: mta_tax
        data_type: numeric
        description: ""

      - name: tip_amount
        data_type: numeric
        description: ""

      - name: tolls_amount
        data_type: numeric
        description: ""

      - name: improvement_surcharge
        data_type: numeric
        description: ""

      - name: total_amount
        data_type: numeric
        description: ""

      - name: payment_type
        data_type: string
        description: ""

      - name: pickup_borough
        data_type: string
        description: ""

      - name: pickup_zone
        data_type: string
        description: ""

      - name: dropoff_borough
        data_type: string
        description: ""

      - name: dropoff_zone
        data_type: string
        description: ""
